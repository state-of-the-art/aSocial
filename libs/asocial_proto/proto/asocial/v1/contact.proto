// Schema definition for contacts (known peers).

syntax = "proto3";

package asocial.v1;

import "google/protobuf/timestamp.proto";

// A remote peer known to a specific persona.
message Contact
{
    string uid = 1; // UUID
    google.protobuf.Timestamp created_at = 2;
    google.protobuf.Timestamp updated_at = 3;

    string persona_uid = 4; // FK -> Persona.uid (owning persona)

    string display_name = 5;
    bytes public_key = 6;  // public key (32 bytes)
    int32 trust_level = 7; // 0 = unknown ... 100 = fully trusted
    optional string notes = 8;

    bytes avatar = 9; // SVG / PNG / JPEG thumbnail (≤ 64 KiB recommended)

    // Birthday for display on persona graph and timeline
    optional google.protobuf.Timestamp birthday = 10;

    // Optional death date (for deceased family members in the family tree)
    optional google.protobuf.Timestamp deathday = 11;

    // Relationship classification: "friend", "family", "colleague", "acquaintance"
    string relationship_type = 12;

    // For family tree: UID of a parent contact (empty if not a family member)
    optional string parent_contact_uid = 13;
}
