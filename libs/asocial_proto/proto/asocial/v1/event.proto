syntax = "proto3";

package asocial.v1;

import "google/protobuf/timestamp.proto";
import "asocial/v1/options_deps.proto";

// A life-event on a persona's timeline.
message Event
{
    option (entity_config) = {
        key_prefix: "e"
        key_pattern: "{persona_uid}/{uid}"
        persona_scoped: true
        sort_field: "started"
        sort_descending: true
    };

    string uid = 1; // UUID
    google.protobuf.Timestamp created_at = 2;
    google.protobuf.Timestamp updated_at = 3;

    string persona_uid = 4 [(deps_config) = {fk: 'Persona.uid'}];

    string title = 5;
    optional string description = 6; // Markdown-formatted description
    optional string location = 7;
    optional google.protobuf.Timestamp started = 8; // When the event happened
    optional google.protobuf.Timestamp ended = 9;   // When the event completed

    // "point" (single timestamp) or "range" (started..ended block)
    string event_type = 10;

    // Display colour in "#RRGGBB" hex format for timeline rendering
    optional string color = 11;

    // Category tag for grouping: "education", "work", "travel", "personal", ...
    optional string category = 12;
}
