syntax = "proto3";

package asocial.v1;

import "google/protobuf/timestamp.proto";
import "asocial/v1/options_deps.proto";

// A named collection of contacts visible to a persona.
message Group
{
    string uid = 1; // UUID
    google.protobuf.Timestamp created_at = 2;
    google.protobuf.Timestamp updated_at = 3;

    string persona_uid = 4 [(deps_config) = {fk: 'Persona.uid'}];

    string name = 5;
    string description = 6;

    // Display colour in "#RRGGBB" hex format for the group ring on the persona graph
    optional string color = 7;
}

// N:M join between Group and Contact.
message GroupMember
{
    string group_uid = 1 [(deps_config) = {fk: 'Group.uid'}];
    string contact_uid = 2 [(deps_config) = {fk: 'Contact.uid'}];
    string role = 3;        // e.g. "admin", "member"
    google.protobuf.Timestamp joined_at = 4;
}
