syntax = "proto3";

package asocial.v1;

import "google/protobuf/timestamp.proto";
import "asocial/v1/options_deps.proto";

// A single message belonging to a thread.
message Message
{
    option (entity_config) = {
        key_prefix: "m"
        key_pattern: "{persona_uid}/{created_at}/{uid}"
        persona_scoped: true
        sort_descending: true
    };

    string uid = 1; // UUID
    google.protobuf.Timestamp created_at = 2;

    string persona_uid = 3 [(deps_config) = {fk: 'Persona.uid'}];

    string thread_uid = 4;         // Logical thread grouping (UUID)
    string sender_contact_uid = 5 [(deps_config) = {fk: 'Contact.uid'}];
    string recipient_type = 6;     // "contact" | "group"
    string recipient_uid = 7 [(deps_config) = {fk: 'Contact.uid,Group.uid'}];

    string body = 8; // Markdown-formatted message body

    // MIME content type for body: "text/markdown" (default), "text/plain", etc.
    string content_type = 9;

    // Inline attachments (images, files) embedded in the message
    repeated MessageAttachment attachments = 10;

    // True if the message has been read by the recipient
    bool is_read = 11;
}

// Binary attachment embedded in a message.
message MessageAttachment
{
    string filename = 1;  // Original filename
    string mime_type = 2; // MIME type, e.g. "image/png", "application/pdf"
    bytes data = 3;       // Raw file content (≤ 10 MiB recommended per attachment)
    bytes thumbnail = 4;  // Optional preview thumbnail for images/videos (≤ 64 KiB)
}
